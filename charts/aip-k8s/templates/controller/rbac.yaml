apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aip-k8s.fullname" . }}-controller
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aip-k8s.fullname" . }}-controller
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - governance.aip.io
  resources:
  - agentgraduationpolicies
  - agentrequests
  - agenttrustprofiles
  - auditrecords
  - diagnosticaccuracysummaries
  - governedresources
  - safetypolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - governance.aip.io
  resources:
  - agentrequests/finalizers
  - governedresources/finalizers
  - mcpservers/finalizers
  - safetypolicies/finalizers
  verbs:
  - update
- apiGroups:
  - governance.aip.io
  resources:
  - agentrequests/status
  - agenttrustprofiles/status
  - auditrecords/status
  - diagnosticaccuracysummaries/status
  - governedresources/status
  - mcpservers/status
  - safetypolicies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - governance.aip.io
  resources:
  - mcpservers
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - governance.aip.io
  resources:
  - agentregistrations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
# create is required by jwtkey_controller which bootstraps the aip-jwt-signing-key
# Secret on first startup. get/list/watch are needed for the MCPServer controller
# to resolve bearerTokenSecretRef across all namespaces (cluster-scoped CRD).
# resourceNames cannot restrict create (the resource does not exist yet at create
# time); the named-resource rule below restricts patch/update to the signing key.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - ""
  resourceNames:
  - aip-jwt-signing-key
  resources:
  - secrets
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - karpenter.sh
  resources:
  - nodepools
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aip-k8s.fullname" . }}-controller
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aip-k8s.fullname" . }}-controller
subjects:
- kind: ServiceAccount
  name: {{ include "aip-k8s.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
