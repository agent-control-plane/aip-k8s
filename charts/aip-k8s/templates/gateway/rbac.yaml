apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
rules:
- apiGroups:
  - governance.aip.io
  resources:
  - agentrequests
  - agentrequests/status
  - agenttrustprofiles
  - agenttrustprofiles/status
  - auditrecords
  - diagnosticaccuracysummaries
  - diagnosticaccuracysummaries/status
  - governedresources
  - governedresources/status
  - safetypolicies
  - agentgraduationpolicies
  - agentgraduationpolicies/status
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - governance.aip.io
  resources:
  - agentregistrations
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - governance.aip.io
  resources:
  - mcpservers
  verbs:
  - get
  - list
  - watch
# The gateway resolves bearerTokenSecretRef from MCPServer CRDs.
# MCPServer is cluster-scoped; users may reference Secrets in any namespace.
# Only "get" is granted (read-only), matching the minimal privilege needed.
# Security: MCPServer CRD creation must be restricted to admins. The MCPServer
# controller validates bearerTokenSecretRef; a compromised gateway could read
# any secret but cannot write them. Audit-log gateway secret access in production.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aip-k8s.fullname" . }}-gateway
subjects:
- kind: ServiceAccount
  name: {{ include "aip-k8s.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
