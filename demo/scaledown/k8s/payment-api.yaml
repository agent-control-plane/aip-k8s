---
# payment-api: simulates a live production service with 3 replicas serving traffic.
# The cost-optimizer agent will attempt to scale this down to 1 replica.
# AIP will block it because the service has active endpoints (live traffic detected).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: default
  labels:
    app: payment-api
    tier: production
    version: v2.0.9
    owner: payments-team
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
        tier: production
        version: v2.0.9
    spec:
      containers:
        - name: payment-api
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: default
  labels:
    app: payment-api
    tier: production
spec:
  selector:
    app: payment-api
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# cost-explorer: a downstream service that depends on payment-api.
# Scaling down payment-api disrupts cost-explorer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-explorer
  namespace: default
  labels:
    app: cost-explorer
    tier: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cost-explorer
  template:
    metadata:
      labels:
        app: cost-explorer
        tier: production
    spec:
      containers:
        - name: cost-explorer
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cost-explorer
  namespace: default
  labels:
    app: cost-explorer
spec:
  selector:
    app: cost-explorer
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# payment-worker: another downstream dependent of payment-api.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-worker
  namespace: default
  labels:
    app: payment-worker
    tier: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-worker
  template:
    metadata:
      labels:
        app: payment-worker
        tier: production
    spec:
      containers:
        - name: payment-worker
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
