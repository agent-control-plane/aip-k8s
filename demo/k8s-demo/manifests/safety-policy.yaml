apiVersion: governance.aip.io/v1alpha1
kind: SafetyPolicy
metadata:
  name: k8s-production-policy
  namespace: default
spec:
  governedResourceSelector:
    matchLabels:
      env: production
      tier: infra
  rules:
    - name: require-approval-for-delete
      type: StateEvaluation
      action: RequireApproval
      message: "Deleting production resources requires human approval."
      expression: >
        request.spec.action == "k8s/resources_delete"

    - name: cap-replica-count
      type: StateEvaluation
      action: Deny
      message: "Production deployments may not exceed 7 replicas. Submit a capacity request to increase the limit."
      expression: >
        request.spec.action == "k8s/resources_scale" &&
        has(request.spec.parameters) &&
        has(request.spec.parameters.scale) &&
        double(request.spec.parameters.scale) > 7.0

    - name: require-approval-for-scale
      type: StateEvaluation
      action: RequireApproval
      message: "Scaling production resources requires human approval."
      expression: >
        request.spec.action == "k8s/resources_scale"
