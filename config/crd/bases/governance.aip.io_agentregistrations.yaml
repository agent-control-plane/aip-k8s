---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agentregistrations.governance.aip.io
spec:
  group: governance.aip.io
  names:
    kind: AgentRegistration
    listKind: AgentRegistrationList
    plural: agentregistrations
    shortNames:
    - areg
    singular: agentregistration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agentIdentity
      name: Agent
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentRegistration is the operator-managed source of truth for an agent's
          identity configuration: OIDC inbound validation and per-service outbound
          credential bindings.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AgentRegistrationSpec defines the operator-declared identity configuration for
              an agent.
            properties:
              agentIdentity:
                description: |-
                  AgentIdentity is the canonical agent name used in AgentRequest.spec.agentIdentity,
                  GovernedResource.spec.permittedAgents, and AgentTrustProfile.spec.agentIdentity.
                minLength: 1
                type: string
              externalIdentities:
                description: |-
                  ExternalIdentities binds per-service outbound credentials to this agent.
                  When the gateway forwards a tool call to service X, it uses the matching
                  binding instead of the MCPServer shared token.
                items:
                  description: |-
                    ExternalIdentityBinding maps an MCP server to the credential provider for
                    this agent on that service.
                  properties:
                    awsWebIdentity:
                      description: AWSWebIdentity is set when Type is AWSWebIdentity.
                      properties:
                        durationSeconds:
                          description: DurationSeconds is the STS session duration
                            (default 3600, max 43200).
                          format: int32
                          type: integer
                        region:
                          description: Region is the AWS region for the STS endpoint.
                          minLength: 1
                          type: string
                        roleARN:
                          description: RoleARN is the IAM role ARN to assume.
                          minLength: 1
                          type: string
                        roleSessionName:
                          description: RoleSessionName labels the STS session in CloudTrail.
                          minLength: 1
                          type: string
                        stsEndpoint:
                          description: STSEndpoint overrides the default regional
                            STS endpoint. Used in testing.
                          type: string
                      required:
                      - region
                      - roleARN
                      - roleSessionName
                      type: object
                    azureWorkloadIdentity:
                      description: AzureWorkloadIdentity is set when Type is AzureWorkloadIdentity.
                      properties:
                        clientID:
                          description: ClientID is the app registration client ID
                            for this agent (not the AIP gateway).
                          minLength: 1
                          type: string
                        scope:
                          description: Scope is the Azure resource scope, e.g. "https://app.vssps.visualstudio.com/.default".
                          minLength: 1
                          type: string
                        tenantID:
                          description: TenantID is the Azure Entra tenant ID.
                          minLength: 1
                          type: string
                      required:
                      - clientID
                      - scope
                      - tenantID
                      type: object
                    kubernetesOIDC:
                      description: KubernetesOIDC is set when Type is KubernetesOIDC.
                      properties:
                        audience:
                          description: Audience overrides the aud claim for the forwarded
                            or exchanged token.
                          type: string
                        tokenExchangeURL:
                          description: |-
                            TokenExchangeURL is an optional RFC 8693 token exchange endpoint.
                            When empty, the agent's JWT is forwarded to K8s directly (passthrough).
                          type: string
                      type: object
                    service:
                      description: Service matches MCPServer.metadata.name (e.g. "github",
                        "k8s-mcp-server").
                      minLength: 1
                      type: string
                    staticSecret:
                      description: StaticSecret is set when Type is StaticSecret.
                      properties:
                        key:
                          description: Key is the Secret data key containing the token.
                          minLength: 1
                          type: string
                        name:
                          description: Name is the Secret name.
                          minLength: 1
                          type: string
                        namespace:
                          description: Namespace is the Secret namespace.
                          minLength: 1
                          type: string
                      required:
                      - key
                      - name
                      - namespace
                      type: object
                    type:
                      description: Type identifies which credential provider to use.
                      enum:
                      - StaticSecret
                      - AzureWorkloadIdentity
                      - AWSWebIdentity
                      - KubernetesOIDC
                      type: string
                  required:
                  - service
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: staticSecret must be set when type is StaticSecret and
                      unset otherwise
                    rule: 'self.type == ''StaticSecret'' ? has(self.staticSecret)
                      : !has(self.staticSecret)'
                  - message: azureWorkloadIdentity must be set when type is AzureWorkloadIdentity
                      and unset otherwise
                    rule: 'self.type == ''AzureWorkloadIdentity'' ? has(self.azureWorkloadIdentity)
                      : !has(self.azureWorkloadIdentity)'
                  - message: awsWebIdentity must be set when type is AWSWebIdentity
                      and unset otherwise
                    rule: 'self.type == ''AWSWebIdentity'' ? has(self.awsWebIdentity)
                      : !has(self.awsWebIdentity)'
                  - message: kubernetesOIDC must be set when type is KubernetesOIDC
                      and unset otherwise
                    rule: 'self.type == ''KubernetesOIDC'' ? has(self.kubernetesOIDC)
                      : !has(self.kubernetesOIDC)'
                type: array
                x-kubernetes-list-map-keys:
                - service
                x-kubernetes-list-type: map
              oidc:
                description: |-
                  OIDC declares which OIDC tokens prove this agent's identity.
                  When absent, the gateway falls back to --agent-subjects flag checks.
                properties:
                  allowedSubjects:
                    description: |-
                      AllowedSubjects lists token subject values that may act as this agent.
                      Supports multiple values for staging/prod variants of the same agent.
                      When empty, any subject is accepted (falls back to --agent-subjects flag).
                    items:
                      type: string
                    type: array
                  issuer:
                    description: Issuer is the OIDC provider URL.
                    minLength: 1
                    type: string
                  subjectClaim:
                    description: |-
                      SubjectClaim is the token claim used as the agent identifier.
                      Defaults to "sub". Common alternatives: "azp" (Keycloak client_credentials),
                      "appid" (Azure AD), "email" (Google service accounts).
                    type: string
                required:
                - issuer
                type: object
            required:
            - agentIdentity
            type: object
          status:
            description: AgentRegistrationStatus defines the observed state of an
              AgentRegistration.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the registration's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: spec.agentIdentity is required
          rule: has(self.spec) && has(self.spec.agentIdentity)
    served: true
    storage: true
    subresources:
      status: {}
