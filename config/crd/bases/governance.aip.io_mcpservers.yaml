---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: mcpservers.governance.aip.io
spec:
  group: governance.aip.io
  names:
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    singular: mcpserver
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: Synced
      type: string
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .status.discoveredToolCount
      name: Tools
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MCPServer is the Schema for registering upstream MCP servers.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MCPServerSpec defines the desired state of an upstream MCP
              server registration.
            properties:
              bearerTokenSecretRef:
                description: |-
                  BearerTokenSecretRef references a Secret containing the bearer token
                  for authenticating to the upstream MCP server.
                  The Secret key is specified by the Key field of the selector.
                properties:
                  key:
                    description: The key of the secret to select from.  Must be a
                      valid secret key.
                    type: string
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  optional:
                    description: Specify whether the Secret or its key must be defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              readOnlyTools:
                description: |-
                  ReadOnlyTools lists tool names that should be treated as read-only.
                  Tools not in this list default to read-write.
                items:
                  type: string
                type: array
              secretNamespace:
                description: |-
                  SecretNamespace specifies the namespace of the Secret referenced by
                  BearerTokenSecretRef. Required when the MCPServer is cluster-scoped.
                  For namespaced MCPServers, defaults to the server's own namespace.
                type: string
              url:
                description: |-
                  URL is the base URL of the upstream MCP server.
                  The gateway uses this directly for MCP protocol calls.
                minLength: 1
                pattern: ^https?://
                type: string
            required:
            - url
            type: object
          status:
            description: MCPServerStatus defines the observed state of an MCPServer.
            properties:
              conditions:
                description: Conditions represent the latest state of the MCPServer.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              discoveredToolCount:
                description: DiscoveredToolCount is the number of tools discovered
                  from upstream.
                type: integer
              lastSyncTime:
                description: LastSyncTime is the last time the controller successfully
                  synced tools.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation last observed by
                  the controller.
                format: int64
                type: integer
              tools:
                description: Tools is the list of tools discovered from the upstream
                  MCP server.
                items:
                  description: MCPServerTool describes a single tool exposed by the
                    upstream MCP server.
                  properties:
                    name:
                      description: Name is the bare tool name (e.g. "create_pull_request").
                      type: string
                    readOnly:
                      description: ReadOnly indicates whether this tool is read-only.
                      type: boolean
                  required:
                  - name
                  - readOnly
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: secretNamespace is required when bearerTokenSecretRef is set
          rule: '!(has(self.spec.bearerTokenSecretRef) && self.spec.secretNamespace
            == '''')'
    served: true
    storage: true
    subresources:
      status: {}
